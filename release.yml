name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme notification-history \
            -configuration Release \
            -archivePath build/notification-history.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/notification-history.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "notification-history" \
            -srcfolder build/export/notification-history.app \
            -ov -format UDZO \
            build/notification-history.dmg

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: build/notification-history.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
